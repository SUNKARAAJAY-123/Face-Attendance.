{% extends "base.html" %}
{% block title %}Add Student{% endblock %}
{% block page_title %}Add New Student{% endblock %}

{% block content %}
<div class="row justify-content-center">
<div class="col-md-6">
<div class="stat-card">
  <h5 style="margin-bottom:20px;font-weight:700">
    <i class="bi bi-person-plus-fill me-2" style="color:var(--primary)"></i>Register Student
  </h5>
  <form method="POST">
    <div class="mb-3">
      <label class="form-label fw-semibold">Full Name *</label>
      <input type="text" name="name" class="form-control" required placeholder="e.g. Ajay Sunkara"/>
    </div>
    <div class="mb-3">
      <label class="form-label fw-semibold">Roll Number *</label>
      <input type="text" name="roll_number" class="form-control" required placeholder="e.g. CS2021001"/>
    </div>
    <div class="mb-3">
      <label class="form-label fw-semibold">Department *</label>
      <input type="text" name="department" class="form-control" required placeholder="e.g. Computer Science"/>
    </div>
    <div class="mb-4">
      <label class="form-label fw-semibold">Email</label>
      <input type="email" name="email" class="form-control" placeholder="student@school.com"/>
    </div>
    <div class="d-flex gap-2">
      <button type="submit" class="btn btn-primary flex-fill">
        <i class="bi bi-check-circle me-1"></i>Register</button>
      <a href="{{ url_for('students') }}" class="btn btn-outline-secondary flex-fill">Cancel</a>
    </div>
  </form>
</div>
</div>
</div>
{% endblock %}
