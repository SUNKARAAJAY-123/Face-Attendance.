<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Login — AttendanceAI</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
  <style>
    body{background:linear-gradient(135deg,#0f172a 0%,#1a73e8 100%);
         min-height:100vh;display:flex;align-items:center;justify-content:center}
    .login-card{background:#fff;border-radius:20px;padding:44px 40px;
                width:100%;max-width:420px;box-shadow:0 20px 60px rgba(0,0,0,.3)}
    .logo{width:56px;height:56px;background:linear-gradient(135deg,#1a73e8,#0d47a1);
          border-radius:16px;display:flex;align-items:center;justify-content:center;
          font-size:1.6rem;color:#fff;margin:0 auto 20px}
    h2{font-size:1.5rem;font-weight:700;text-align:center;color:#0f172a;margin-bottom:6px}
    .sub{text-align:center;color:#64748b;font-size:.85rem;margin-bottom:28px}
    .form-label{font-size:.82rem;font-weight:600;color:#374151}
    .form-control{border-radius:10px;padding:10px 14px;border-color:#e2e8f0;font-size:.9rem}
    .form-control:focus{border-color:#1a73e8;box-shadow:0 0 0 3px rgba(26,115,232,.15)}
    .btn-login{background:linear-gradient(135deg,#1a73e8,#0d47a1);border:none;
               border-radius:10px;padding:12px;font-weight:600;font-size:.95rem;
               width:100%;color:#fff;transition:opacity .2s}
    .btn-login:hover{opacity:.9;color:#fff}
    .hint{background:#f8fafc;border-radius:10px;padding:12px 16px;
          font-size:.78rem;color:#64748b;margin-top:20px;border:1px solid #e2e8f0}
    .hint b{color:#374151}
    .input-group-text{border-color:#e2e8f0;background:#f8fafc;cursor:pointer}
  </style>
</head>
<body>
<div class="login-card">
  <div class="logo"><i class="bi bi-camera-video-fill"></i></div>
  <h2>AttendanceAI</h2>
  <p class="sub">Face Recognition Attendance System</p>

  {% with messages = get_flashed_messages(with_categories=true) %}
  {% for cat, msg in messages %}
  <div class="alert alert-{{ cat }} py-2 mb-3" style="font-size:.85rem">{{ msg }}</div>
  {% endfor %}
  {% endwith %}

  <form method="POST">
    <div class="mb-3">
      <label class="form-label">Username</label>
      <div class="input-group">
        <span class="input-group-text"><i class="bi bi-person-fill"></i></span>
        <input type="text" name="username" class="form-control"
               placeholder="Enter username" required autofocus/>
      </div>
    </div>
    <div class="mb-4">
      <label class="form-label">Password</label>
      <div class="input-group">
        <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
        <input type="password" name="password" id="pwd" class="form-control"
               placeholder="Enter password" required/>
        <span class="input-group-text" onclick="togglePwd()">
          <i class="bi bi-eye-fill" id="eye"></i></span>
      </div>
    </div>
    <button type="submit" class="btn-login">
      <i class="bi bi-box-arrow-in-right me-2"></i>Sign In
    </button>
  </form>

  <div class="hint">
    <div><b>Admin:</b> admin / admin123</div>
    <div><b>Teacher:</b> teacher / teacher123</div>
  </div>
</div>
<script>
function togglePwd(){
  const p=document.getElementById('pwd');
  const e=document.getElementById('eye');
  if(p.type==='password'){p.type='text';e.className='bi bi-eye-slash-fill';}
  else{p.type='password';e.className='bi bi-eye-fill';}
}
</script>
</body>
</html>
