{% extends "base.html" %}
{% block title %}Add User{% endblock %}
{% block page_title %}Add New User{% endblock %}

{% block content %}
<div class="row justify-content-center">
<div class="col-md-6">
<div class="stat-card">
  <h5 style="margin-bottom:20px;font-weight:700">
    <i class="bi bi-shield-plus me-2" style="color:var(--primary)"></i>Create User Account
  </h5>
  <form method="POST">
    <div class="mb-3">
      <label class="form-label fw-semibold">Username *</label>
      <input type="text" name="username" class="form-control" required/>
    </div>
    <div class="mb-3">
      <label class="form-label fw-semibold">Full Name *</label>
      <input type="text" name="full_name" class="form-control" required/>
    </div>
    <div class="mb-3">
      <label class="form-label fw-semibold">Password *</label>
      <input type="password" name="password" class="form-control" required minlength="6"/>
    </div>
    <div class="mb-3">
      <label class="form-label fw-semibold">Role *</label>
      <select name="role" class="form-select" required>
        <option value="teacher">Teacher</option>
        <option value="admin">Admin</option>
      </select>
    </div>
    <div class="mb-4">
      <label class="form-label fw-semibold">Email</label>
      <input type="email" name="email" class="form-control"/>
    </div>
    <div class="d-flex gap-2">
      <button type="submit" class="btn btn-primary flex-fill">
        <i class="bi bi-check-circle me-1"></i>Create</button>
      <a href="{{ url_for('users') }}" class="btn btn-outline-secondary flex-fill">Cancel</a>
    </div>
  </form>
</div>
</div>
</div>
{% endblock %}
