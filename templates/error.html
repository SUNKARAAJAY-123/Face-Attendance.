{% extends "base.html" %}
{% block title %}Error {{ code }}{% endblock %}
{% block page_title %}Error{% endblock %}
{% block content %}
<div class="stat-card text-center py-5">
  <div style="font-size:4rem;font-weight:800;color:var(--primary)">{{ code }}</div>
  <p style="font-size:1rem;color:var(--muted);margin-top:8px">{{ msg }}</p>
  <a href="{{ url_for('dashboard') }}" class="btn btn-primary mt-3">
    <i class="bi bi-house-fill me-2"></i>Back to Dashboard</a>
</div>
{% endblock %}
